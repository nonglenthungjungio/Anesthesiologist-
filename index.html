<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Revision Monitor — MD Anaesthesiology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080d11; --panel:#0e161c; --panel2:#121d24; --line:#1d2b34;
  --ink:#e8f2f4; --muted:#7b939f; --dim:#546874;
  --p1:#4ade80; --p2:#22d3ee; --p3:#fbbf24; --p4:#fb7185;
  --tS:#ef4444; --tA:#f59e0b; --tB:#06b6d4;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'IBM Plex Sans',system-ui,sans-serif; font-size:15px; line-height:1.5;
  padding-bottom:64px;
}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:2px solid var(--p2); outline-offset:2px; border-radius:4px}

/* ---------- MONITOR HEADER ---------- */
.monitor{
  position:sticky; top:0; z-index:50;
  background:linear-gradient(180deg,#0b1318 0%,#0a1116 100%);
  border-bottom:1px solid var(--line);
  box-shadow:0 6px 22px rgba(0,0,0,.55);
}
.mon-top{display:flex;align-items:center;gap:10px;padding:9px 14px 6px}
.mon-id{font-family:'IBM Plex Sans Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.10em;color:var(--ink);text-transform:uppercase;min-width:0;display:flex;flex-direction:column;gap:1px}
.mon-id b{color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mon-by{font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:400;letter-spacing:.04em;color:var(--muted);text-transform:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mon-overall{margin-left:auto;display:flex;align-items:baseline;gap:5px;flex-shrink:0}
.mon-overall .big{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:27px;line-height:1;color:var(--p1);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.mon-overall .unit{font-size:12px;color:var(--dim);font-weight:600}

/* ECG trace signature */
.trace{height:34px;width:100%;display:block}
.trace path{fill:none;stroke:var(--p1);stroke-width:1.6;stroke-linejoin:round;stroke-linecap:round;
  filter:drop-shadow(0 0 4px rgba(74,222,128,.5))}
.trace .sweep{stroke:var(--p1);opacity:.85}
@media (prefers-reduced-motion:no-preference){
  .trace .sweep{stroke-dasharray:1400;stroke-dashoffset:1400;animation:sweep 4.5s linear infinite}
  @keyframes sweep{to{stroke-dashoffset:0}}
}

/* channels */
.channels{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);border-top:1px solid var(--line)}
.ch{background:#0c141a;padding:7px 6px 8px;min-width:0}
.ch-lab{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--dim);text-transform:uppercase;display:flex;justify-content:space-between;gap:3px;white-space:nowrap;overflow:hidden}
.ch-val{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;line-height:1.15;font-variant-numeric:tabular-nums}
.ch.prio{background:#101a17;box-shadow:inset 0 0 0 1px rgba(239,68,68,.18)}
.ch-bar{height:3px;border-radius:2px;background:#1b2830;margin-top:5px;overflow:hidden}
.ch-fill{height:100%;border-radius:2px;transition:width .45s cubic-bezier(.4,0,.2,1)}
@media (prefers-reduced-motion:reduce){.ch-fill{transition:none}}

/* ---------- TABS ---------- */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 12px;background:var(--panel);border-bottom:1px solid var(--line);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:600;
  color:var(--muted);border:1px solid var(--line);background:#0c141a;white-space:nowrap;
  transition:color .15s,border-color .15s,background .15s;
}
.tab[aria-selected="true"]{color:#07110d;background:var(--tabc,var(--p1));border-color:var(--tabc,var(--p1))}

/* ---------- SEARCH ---------- */
.toolbar{display:flex;gap:8px;padding:11px 12px 4px;align-items:center}
.search{
  flex:1;background:#0c141a;border:1px solid var(--line);border-radius:10px;
  padding:9px 12px;color:var(--ink);font-size:14px;font-family:inherit;min-width:0;
}
.search::placeholder{color:var(--dim)}
.btn-ghost{
  padding:9px 11px;border-radius:10px;border:1px solid var(--line);background:#0c141a;
  color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap;
}
.btn-ghost:hover{color:var(--ink);border-color:#2b3d48}

/* ---------- CONTENT ---------- */
.wrap{padding:8px 12px 0;max-width:960px;margin:0 auto}
.grp{margin:14px 0 18px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel)}
.grp-head{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel2);border-bottom:1px solid var(--line)}
.grp-key{
  font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:#0a0f13;
}
.grp-meta{flex:1;min-width:0}
.grp-title{font-family:'IBM Plex Sans Condensed',sans-serif;font-weight:700;font-size:14.5px;letter-spacing:.01em;line-height:1.25}
.grp-note{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.45}
.grp-count{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--dim);flex-shrink:0;font-variant-numeric:tabular-nums}

.rule{padding:9px 13px;font-size:11.5px;color:var(--muted);background:#0a1218;border-bottom:1px solid var(--line);line-height:1.5}
.rule b{color:var(--ink)}

/* rows */
.row{display:flex;gap:10px;padding:10px 13px;border-bottom:1px solid #16222a;align-items:flex-start}
.row:last-child{border-bottom:none}
.row.done{background:rgba(74,222,128,.045)}
.row.mid{background:rgba(251,191,36,.04)}

.tick{
  flex-shrink:0;width:26px;height:26px;border-radius:8px;border:1.5px solid #2a3b46;
  background:#0b1216;display:flex;align-items:center;justify-content:center;margin-top:1px;
  transition:border-color .15s,background .15s;position:relative;
}
.tick:hover{border-color:#3b5262}
.tick::after{content:"";position:absolute;inset:-9px} /* 44px thumb target */
.tick svg{width:15px;height:15px;display:none}
.tick .half{width:9px;height:9px;border-radius:2px;display:none}
.tick[data-s="1"]{border-color:var(--tA)}
.tick[data-s="1"] .half{display:block;background:var(--tA)}
.tick[data-s="2"]{border-color:var(--p1);background:rgba(74,222,128,.16)}
.tick[data-s="2"] svg{display:block;stroke:var(--p1)}

.rbody{flex:1;min-width:0}
.rtext{font-size:13.5px;line-height:1.45;font-weight:500}
.row.done .rtext{color:var(--muted)}
.rmeta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:5px}
.pill{
  font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:500;letter-spacing:.03em;
  padding:2px 6px;border-radius:5px;border:1px solid;background:transparent;
}
.hook{font-size:11px;color:var(--muted);line-height:1.45;margin-top:3px}
.state-lab{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--dim);letter-spacing:.05em;flex-shrink:0;margin-top:4px;width:52px;text-align:right}

.empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:13.5px}
.empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:6px;font-family:'IBM Plex Sans Condensed',sans-serif}

/* ---------- LAB ---------- */
.lab-hero{border:1px solid #24404a;border-radius:14px;padding:15px 15px 13px;margin:14px 0;
  background:linear-gradient(135deg,#0d1c22,#101a24)}
.lab-hero h2{font-family:'IBM Plex Sans Condensed',sans-serif;font-size:19px;letter-spacing:.01em;
  background:linear-gradient(90deg,var(--p2),var(--p1));-webkit-background-clip:text;background-clip:text;color:transparent}
.lab-hero p{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.55}
.lab-form{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.lab-form input,.lab-form select,.lab-form textarea{
  background:#0a1216;border:1px solid var(--line);border-radius:9px;padding:9px 11px;
  color:var(--ink);font-family:inherit;font-size:13.5px;width:100%}
.lab-form textarea{resize:vertical;min-height:44px}
.lab-form input::placeholder,.lab-form textarea::placeholder{color:var(--dim)}
.lab-row2{display:flex;gap:8px}
.lab-row2 select{flex:1}
.btn-go{background:var(--p2);color:#04191d;font-weight:700;font-size:13.5px;padding:10px 14px;border-radius:9px;flex-shrink:0}
.btn-go:disabled{opacity:.4}
.lab-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn-mail{background:#16323a;color:var(--p2);border:1px solid #245862;font-weight:600;font-size:12px;padding:9px 13px;border-radius:9px}
.chk{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);padding:2px 0}
.chk input{width:16px;height:16px;accent-color:var(--p2);flex-shrink:0}
.lab-note{font-size:10.5px;color:var(--dim);line-height:1.5;margin-top:8px;border-left:2px solid #26414b;padding-left:9px}
.del{color:var(--dim);font-size:16px;line-height:1;padding:4px 7px;border-radius:6px;flex-shrink:0}
.del:hover{color:var(--tS);background:rgba(239,68,68,.1)}
.by{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--dim);letter-spacing:.03em}

/* legend + footer */
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 13px;font-size:11px;color:var(--muted);align-items:center}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:11px;height:11px;border-radius:4px;border:1.5px solid #2a3b46;flex-shrink:0}
.foot{padding:20px 14px 30px;text-align:center;color:var(--dim);font-size:11px;line-height:1.6;max-width:600px;margin:0 auto}
.save-note{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;background:#12222a;border:1px solid var(--line);
  color:var(--muted);font-size:11.5px;padding:7px 14px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:80;
  font-family:'IBM Plex Mono',monospace}
.save-note.show{opacity:1}

@media(min-width:700px){
  body{font-size:15px}
  .rtext{font-size:14px}
  .mon-overall .big{font-size:32px}
  .ch-val{font-size:20px}
}
</style>
</head>
<body>

<header class="monitor">
  <div class="mon-top">
    <div class="mon-id"><b>REVISION MONITOR</b><span class="mon-by">MD Anaesthesiology &middot; curated by Jungio</span></div>
    <div class="mon-overall"><span class="big mono" id="overallPct">0</span><span class="unit">%</span></div>
  </div>
  <svg class="trace" viewBox="0 0 1400 34" preserveAspectRatio="none" aria-hidden="true">
    <path class="sweep" id="ecg"></path>
  </svg>
  <div class="channels" id="channels"></div>
</header>

<nav class="tabs" id="tabs" role="tablist" aria-label="Sections"></nav>

<div class="toolbar">
  <input class="search" id="search" type="search" placeholder="Search any topic…" aria-label="Search topics">
  <button class="btn-ghost" id="resetBtn">Reset</button>
</div>

<div class="legend">
  <span><i class="dot"></i> Not started</span>
  <span><i class="dot" style="border-color:#f59e0b"></i> Revised</span>
  <span><i class="dot" style="border-color:#4ade80;background:rgba(74,222,128,.2)"></i> Confident</span>
  <span style="color:#546874">Tap a box to cycle</span>
</div>

<main class="wrap" id="content"></main>

<div class="foot">
  Progress saves automatically and will be here when you come back.<br>
  Confident counts full, revised counts half.
</div>
<div class="save-note mono" id="saveNote">saved</div>

/* ============ STATE ============ */
const KEY='anaesth-revision-v1';
const LKEY='anaesth-lab-v1';
const NKEY='anaesth-name-v1';
const OWNER='nonglenthungjungio@gmail.com';
let state={}; let LAB=[]; let POOL=[]; let myName='';
let ALL=[];

function buildIndex(){
  ALL=[];
  MASTER.forEach(t=>t.items.forEach((it,i)=>ALL.push({
    id:`m-${t.k}-${i}`,text:it[0],years:it[1],paper:it[2],hook:it[3],tab:'master',group:t.k
  })));
  Object.keys(PAPERS).forEach(pk=>PAPERS[pk].years.forEach(([yr,qs])=>qs.forEach((q,i)=>ALL.push({
    id:`${pk}-${yr}-${i}`,text:q,years:yr,paper:pk,hook:'',tab:pk,group:yr
  }))));
  LAB.forEach(e=>ALL.push({id:e.id,text:e.text,years:'mine',paper:e.tag,hook:e.note||'',tab:'lab',group:'mine'}));
}

async function load(){
  try{ state=JSON.parse(localStorage.getItem(KEY)||'{}'); }catch(e){ state={}; }
  try{ LAB=JSON.parse(localStorage.getItem(LKEY)||'[]'); }catch(e){ LAB=[]; }
  try{ myName=localStorage.getItem(NKEY)||''; }catch(e){ myName=''; }
  buildIndex();
}
async function loadPool(){
  POOL=[]; // Shared board disabled on GitHub Pages without a backend.
}
async function saveLab(){
  localStorage.setItem(LKEY,JSON.stringify(LAB));
}catch(e){}
}
let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    localStorage.setItem(KEY,JSON.stringify(state));
    toast('saved');
  },400);
}
function toast(msg){
  const n=document.getElementById('saveNote'); n.textContent=msg; n.classList.add('show');
  clearTimeout(n._t); n._t=setTimeout(()=>n.classList.remove('show'),1400);
}
const st=id=>state[id]||0;

/* ============ PROGRESS ============ */
function pct(list){
  if(!list.length) return 0;
  const s=list.reduce((a,x)=>a+(st(x.id)===2?1:st(x.id)===1?.5:0),0);
  return Math.round(s/list.length*100);
}
function renderMonitor(){
  document.getElementById('overallPct').textContent=pct(ALL);
  const ch=document.getElementById('channels');
  if(!ch.children.length){
    ch.innerHTML=`<div class="ch prio"><div class="ch-lab"><span>Tier S</span><span id="c-S-n"></span></div>
        <div class="ch-val" id="c-S" style="color:var(--tS)">0%</div>
        <div class="ch-bar"><div class="ch-fill" id="f-S" style="background:var(--tS);width:0%"></div></div></div>`
      + Object.keys(PAPERS).map(pk=>{
      const p=PAPERS[pk];
      return `<div class="ch"><div class="ch-lab"><span>${p.name.replace('Paper ','P')}</span><span id="c-${pk}-n"></span></div>
        <div class="ch-val" id="c-${pk}" style="color:${p.color}">0%</div>
        <div class="ch-bar"><div class="ch-fill" id="f-${pk}" style="background:${p.color};width:0%"></div></div></div>`;
    }).join('');
  }
  const sList=ALL.filter(x=>x.group==='S'&&x.tab==='master'), sv=pct(sList);
  document.getElementById('c-S').textContent=sv+'%';
  document.getElementById('f-S').style.width=sv+'%';
  document.getElementById('c-S-n').textContent=sList.filter(x=>st(x.id)===2).length+'/'+sList.length;
  Object.keys(PAPERS).forEach(pk=>{
    const l=ALL.filter(x=>x.tab===pk), v=pct(l);
    document.getElementById('c-'+pk).textContent=v+'%';
    document.getElementById('f-'+pk).style.width=v+'%';
    document.getElementById('c-'+pk+'-n').textContent=l.filter(x=>st(x.id)===2).length+'/'+l.length;
  });
  drawECG(pct(ALL));
}
function drawECG(p){
  // one full beat per 100px; amplitude of the R wave grows with progress
  const w=1400,mid=17,amp=3+ (p/100)*11;
  let d='M0,'+mid;
  for(let x=0;x<w;x+=100){
    d+=` L${x+30},${mid} q6,-${amp*0.28} 10,0 L${x+46},${mid} L${x+50},${mid+amp*0.35} L${x+55},${mid-amp} L${x+60},${mid+amp*0.5} L${x+65},${mid} L${x+78},${mid} q8,-${amp*0.42} 14,0 L${x+100},${mid}`;
  }
  document.getElementById('ecg').setAttribute('d',d);
}

/* ============ RENDER ============ */
let tab='master', q='';
const TABS=[{id:'master',label:'Master list',color:'var(--tS)'},
  ...Object.keys(PAPERS).map(k=>({id:k,label:PAPERS[k].name,color:PAPERS[k].color})),
  {id:'lab',label:"Jungio's Lab",color:'var(--p2)'}];

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>
    `<button class="tab" role="tab" aria-selected="${t.id===tab}" data-tab="${t.id}" style="--tabc:${t.color}">${t.label}</button>`).join('');
}

function rowHTML(it,accent){
  const s=st(it.id);
  const cls=s===2?'row done':s===1?'row mid':'row';
  const lab=s===2?'CONFIDENT':s===1?'REVISED':'';
  return `<div class="${cls}" data-row="${it.id}">
    <button class="tick" data-s="${s}" data-id="${it.id}" role="checkbox" aria-checked="${s===2}"
      aria-label="${esc(it.text)} — ${s===2?'confident':s===1?'revised':'not started'}">
      <span class="half"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </button>
    <div class="rbody">
      <div class="rtext">${esc(it.text)}</div>
      ${it.hook?`<div class="hook">${esc(it.hook)}</div>`:''}
      <div class="rmeta">
        ${it.tab==='master'?`<span class="pill" style="color:${accent};border-color:${accent}55">${it.paper}</span>
        <span class="pill" style="color:var(--dim);border-color:#25353f">${it.years}</span>`:''}
      </div>
    </div>
    <div class="state-lab">${lab}</div>
  </div>`;
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function labRowHTML(it){
  const s=st(it.id);
  const cls=s===2?'row done':s===1?'row mid':'row';
  const lab=s===2?'CONFIDENT':s===1?'REVISED':'';
  return `<div class="${cls}" data-row="${it.id}">
    <button class="tick" data-s="${s}" data-id="${it.id}" role="checkbox" aria-checked="${s===2}"
      aria-label="${esc(it.text)} — ${s===2?'confident':s===1?'revised':'not started'}">
      <span class="half"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </button>
    <div class="rbody">
      <div class="rtext">${esc(it.text)}</div>
      ${it.hook?`<div class="hook">${esc(it.hook)}</div>`:''}
      <div class="rmeta"><span class="pill" style="color:var(--p2);border-color:#245862">${esc(it.paper)}</span></div>
    </div>
    <div class="state-lab">${lab}</div>
    <button class="del" data-del="${it.id}" aria-label="Delete this entry">&times;</button>
  </div>`;
}

function wireLab(){
  const add=document.getElementById('labAdd');
  if(!add) return;
  add.addEventListener('click',async()=>{
    const ti=document.getElementById('labText');
    const t=ti.value.trim();
    if(!t){ti.focus();return;}
    const note=document.getElementById('labNote').value.trim();
    const tag=document.getElementById('labTag').value;
    const share=document.getElementById('labShare').checked;
    const nm=document.getElementById('labName').value.trim();
    if(nm!==myName){ myName=nm; localStorage.setItem(NKEY,myName); }
    const id='lab-'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
    LAB.push({id,text:t,note,tag,at:Date.now()});
    await saveLab(); buildIndex();
    if(share){
      try{
        toast('Shared board requires a backend (Firebase/Supabase). Entry saved locally.');
      }catch(e){ toast('added — board unavailable'); }
    } else toast('entry added');
    render();
  });
  document.getElementById('poolBtn').addEventListener('click',async()=>{
    toast('Shared board unavailable in local version');
  });
  document.getElementById('mailBtn').addEventListener('click',()=>{
    if(!LAB.length){toast('no entries yet');return;}
    const body=LAB.map((e,i)=>`${i+1}. [${e.tag}] ${e.text}${e.note?'\n   note: '+e.note:''}`).join('\n\n');
    const subj=`Jungio's Lab entries${myName?' from '+myName:''} (${LAB.length})`;
    window.location.href=`mailto:${OWNER}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  });
}

  renderTabs(); renderMonitor();
  const c=document.getElementById('content');
  const term=q.trim().toLowerCase();

          <div class="grp-key" style="background:${p.color}">${yr.slice(2)}</div>

    </div>`;

    html+=`<section class="grp">
      <div class="grp-head">
        <div class="grp-key" style="background:var(--p2)">L</div>
        <div class="grp-meta"><div class="grp-title">My entries</div>
          <div class="grp-note" data-note="lab|mine">${mine.filter(x=>st(x.id)===2).length} of ${ALL.filter(x=>x.tab==='lab').length} confident</div></div>
        <div class="grp-count" data-count="lab|mine">${pct(ALL.filter(x=>x.tab==='lab'))}%</div>
      </div>
      ${mine.length?mine.map(i=>labRowHTML(i)).join(''):'<div class="empty"><b>No entries yet</b>Add the first thing you keep forgetting.</div>'}
    </section>`;

    html+=`<section class="grp">
      <div class="grp-head">
        <div class="grp-key" style="background:#334155;color:#cbd5e1">∑</div>
        <div class="grp-meta"><div class="grp-title">Shared board</div>
          <div class="grp-note">${POOL.length} entr${POOL.length===1?'y':'ies'} posted by everyone using this</div></div>
      </div>
      ${POOL.length?POOL.map(p=>`<div class="row"><div class="rbody">
          <div class="rtext">${esc(p.text)}</div>
          ${p.note?`<div class="hook">${esc(p.note)}</div>`:''}
          <div class="rmeta"><span class="pill" style="color:var(--p2);border-color:#245862">${esc(p.tag||'—')}</span>
          <span class="by">${esc(p.by||'anonymous')}</span></div>
        </div></div>`).join('')
        :'<div class="empty"><b>Board is empty</b>Tick “Also post to the shared board” when you add an entry.</div>'}
    </section>`;
    c.innerHTML=html; wireLab(); return;
  }
  if(!hits) html=`<div class="empty"><b>Nothing matches &ldquo;${esc(q)}&rdquo;</b>Try a shorter word — airway, epidural, capno.</div>`;
  c.innerHTML=html;
}

/* ============ EVENTS ============ */
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('[data-tab]'); if(!b)return;
  tab=b.dataset.tab; window.scrollTo({top:0,behavior:'instant'}); render();
});
function refreshCounters(){
  document.querySelectorAll('[data-note]').forEach(el=>{
    const [tb,gp]=el.dataset.note.split('|');
    const l=ALL.filter(x=>x.tab===tb&&x.group===gp);
    const c=l.filter(x=>st(x.id)===2).length;
    el.textContent = tb==='master'
      ? `${c} of ${l.length} confident · ${pct(l)}% complete`
      : `${c} of ${l.length} confident`;
  });
  document.querySelectorAll('[data-count]').forEach(el=>{
    const [tb,gp]=el.dataset.count.split('|');
    const l=ALL.filter(x=>x.tab===tb&&(gp==='ALL'||x.group===gp));
    el.textContent=pct(l)+'%';
  });
  renderMonitor();
}
document.getElementById('content').addEventListener('click',e=>{
  const d=e.target.closest('[data-del]');
  if(d){
    const id=d.dataset.del;
    if(!confirm('Delete this entry? Your tick for it goes too.'))return;
    LAB=LAB.filter(x=>x.id!==id); delete state[id];
    saveLab(); save(); buildIndex(); render(); toast('entry deleted');
    return;
  }
  const b=e.target.closest('.tick'); if(!b)return;
  const id=b.dataset.id;
  const s=(st(id)+1)%3;
  if(s) state[id]=s; else delete state[id];
  save();
  // update this row in place — keeps focus, scroll and DOM identity
  const row=b.closest('.row');
  row.className = s===2?'row done':s===1?'row mid':'row';
  b.dataset.s=s;
  b.setAttribute('aria-checked', s===2);
  const item=ALL.find(x=>x.id===id);
  b.setAttribute('aria-label',`${item.text} — ${s===2?'confident':s===1?'revised':'not started'}`);
  row.querySelector('.state-lab').textContent = s===2?'CONFIDENT':s===1?'REVISED':'';
  refreshCounters();
});
document.getElementById('search').addEventListener('input',e=>{q=e.target.value;render()});
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('Clear all progress? This cannot be undone.'))return;
  state={}; save(); render(); toast('progress cleared');
});

(async()=>{ await load(); render(); await loadPool(); if(tab==='lab') render(); })();
</script>
</body>
</html>
